<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up • LegalAI</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg">
  <div class="container" style="max-width:560px">
    <div class="card big-card" style="text-align:center">
      <div class="logo" style="margin:0 auto 8px"></div>
      <div class="heading">Create account</div>
      <div class="sub">Join LegalAI</div>
      <form method="post" action="/signup" class="row">
        <input class="input" type="text" name="name" placeholder="Full name" required>
        <input class="input" type="email" name="email" placeholder="Email" required>
        <input class="input" type="password" name="password" placeholder="Password" required>
        <button class="btn cta" type="submit">Sign up</button>
      </form>
      <div class="sub">Already have an account? <a href="/login">Login</a></div>
    </div>
  </div>
</body>
</html>
