<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • LegalAI</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg">
  <div class="container" style="max-width:560px">
    <div class="card big-card" style="text-align:center">
      <div class="logo" style="margin:0 auto 8px"></div>
      <div class="heading">Welcome back</div>
      <div class="sub">Login to continue</div>
      <form method="post" action="/login" class="row">
        <input class="input" type="email" name="email" placeholder="Email" required>
        <input class="input" type="password" name="password" placeholder="Password" required>
        <button class="btn cta" type="submit">Login</button>
      </form>
      <div class="sub">No account? <a href="/signup">Sign up</a></div>
    </div>
  </div>
</body>
</html>
